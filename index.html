<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Summer 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root{
    --ink:#1a1a1a;
    --muted:#6b6b6b;
    --hairline:#e5e5e5;
    --bg:#f6f5f0;
    --card:#ffffff;
    --accent:#3d6230;
    --accent-soft:#e7f0e3;
    --warn:#c2410c;

    --loc-nyc:#888780;
    --loc-nyc-soft:#eeede8;
    --loc-vt:#3d6230;
    --loc-vt-soft:#e7f0e3;
    --loc-me:#1d4ed8;
    --loc-me-soft:#e6efff;
    --loc-mtl:#b45309;
    --loc-mtl-soft:#fdf2e3;
    --loc-transit:#7c3aed;
    --loc-transit-soft:#f1ebfb;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  body{display:flex;flex-direction:column;min-height:100vh}
  header{padding:18px 22px 12px;background:var(--bg);border-bottom:1px solid var(--hairline);position:sticky;top:0;z-index:1000}
  .kicker{font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:2px;font-weight:600}
  h1{font-size:22px;font-weight:800;margin:0 0 2px;letter-spacing:-.01em}
  .sub{font-size:13px;color:var(--muted);margin-bottom:12px}
  .pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin:0 -22px;padding-left:22px;padding-right:22px;scrollbar-width:thin}
  .date-pills{margin-top:6px;padding-top:2px;border-top:0.5px solid var(--hairline);padding-bottom:2px}
  .pill{flex:none;padding:7px 12px;border-radius:999px;border:1.5px solid var(--hairline);background:#fff;color:var(--ink);font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
  .pill .ds{font-size:10.5px;color:var(--muted);font-weight:500}
  .pill.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .pill.active .ds{color:rgba(255,255,255,.7)}
  main{flex:1;padding:22px;max-width:920px;margin:0 auto;width:100%}
  .panel{background:var(--card);border-radius:14px;border:0.5px solid var(--hairline);padding:22px;margin-bottom:18px}
  .panel h2{font-size:18px;font-weight:700;margin:0 0 10px;letter-spacing:-.01em}
  .panel p{font-size:13.5px;line-height:1.55;color:var(--ink);margin:0 0 10px}
  .sect{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--warn);font-weight:700;margin:18px 0 8px}
  .sect:first-child{margin-top:0}
  .meta{display:grid;grid-template-columns:130px 1fr;gap:10px 16px;font-size:13px;line-height:1.5}
  .meta .k{color:var(--muted);font-weight:600}
  .meta .v{color:var(--ink)}
  .meta .v b{font-weight:600}
  .tag{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:999px;margin-right:4px;margin-bottom:4px}
  .tag-nyc{background:var(--loc-nyc-soft);color:#3a3a35}
  .tag-vt{background:var(--loc-vt-soft);color:var(--loc-vt)}
  .tag-me{background:var(--loc-me-soft);color:var(--loc-me)}
  .tag-mtl{background:var(--loc-mtl-soft);color:var(--loc-mtl)}
  .tag-transit{background:var(--loc-transit-soft);color:var(--loc-transit)}

  .ww-wrap{overflow-x:auto;margin:0 -22px;padding:0 22px}
  .ww{border-collapse:collapse;width:100%;min-width:740px;font-size:11.5px}
  .ww th, .ww td{border:1px solid var(--hairline);padding:6px 6px;text-align:center;vertical-align:middle}
  .ww thead th{background:#fafaf6;color:var(--muted);font-weight:600;font-size:10.5px;letter-spacing:.02em}
  .ww thead th .dnum{display:block;font-size:13px;color:var(--ink);font-weight:700;margin-top:2px}
  .ww tbody th{text-align:left;background:#fafaf6;font-weight:700;color:var(--ink);padding:8px 10px;font-size:12px;min-width:64px}
  .ww .c{font-weight:600;color:#1a1a1a;font-size:11.5px;padding:5px 4px}
  .ww .c.nyc{background:var(--loc-nyc-soft);color:#3a3a35}
  .ww .c.vt{background:var(--loc-vt-soft);color:var(--loc-vt)}
  .ww .c.me{background:var(--loc-me-soft);color:var(--loc-me)}
  .ww .c.mtl{background:var(--loc-mtl-soft);color:var(--loc-mtl)}
  .ww .c.transit{background:var(--loc-transit-soft);color:var(--loc-transit)}
  .ww .c .sub{display:block;font-size:9.5px;font-weight:500;opacity:.75;margin-top:1px}
  .ww .today{outline:2px solid var(--warn);outline-offset:-2px}

  .tracks{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:10px}
  .track{background:#fafaf6;border-radius:10px;padding:12px 14px;font-size:12.5px;line-height:1.5}
  .track h3{font-size:13px;margin:0 0 4px;font-weight:700}
  .track .who{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}

  .skel{font-size:12px;color:var(--muted);font-style:italic;background:#fafaf6;border:1px dashed var(--hairline);padding:10px 12px;border-radius:8px;margin-top:6px}

  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .legend .tag{font-size:10px}

  footer{padding:18px 22px 28px;font-size:11.5px;color:var(--muted);text-align:center}

  /* lock screen */
  .gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;z-index:9999}
  .gate-card{background:#fff;border-radius:18px;border:0.5px solid var(--hairline);padding:32px 28px;max-width:380px;width:100%;text-align:center}
  .gate-card .kicker{justify-content:center}
  .gate-card h1{font-size:22px;margin:6px 0 8px}
  .gate-card p{font-size:13px;color:var(--muted);line-height:1.5;margin:0 0 18px}
  .gate-form{display:flex;flex-direction:column;gap:10px}
  .gate-form input{font-size:15px;padding:11px 14px;border-radius:10px;border:1.5px solid var(--hairline);background:#fafaf6;color:var(--ink);font-family:inherit;outline:none}
  .gate-form input:focus{border-color:var(--accent);background:#fff}
  .gate-form button{font-size:14px;font-weight:600;padding:11px 14px;border-radius:10px;border:0;background:var(--ink);color:#fff;cursor:pointer;font-family:inherit}
  .gate-form button:hover{background:#000}
  .gate-err{font-size:12px;color:#b91c1c;margin-top:6px;min-height:14px}

  /* Montreal map + recs */
  #mtl-map{height:420px;width:100%;border-radius:10px;background:#e8e4dc;margin-bottom:14px}
  .leaflet-container{font-family:inherit}
  .leaflet-popup-content-wrapper{border-radius:12px;padding:0}
  .leaflet-popup-content{margin:0;font:inherit;width:240px!important}
  .mp{padding:12px 14px 10px}
  .mp .pt{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--warn);margin-bottom:2px}
  .mp .pn{font-size:14px;font-weight:700;color:var(--ink);margin:0 0 5px;line-height:1.3}
  .mp .pd{font-size:12px;color:var(--ink);line-height:1.45;margin-bottom:8px}
  .mp .pf{font-size:11px;color:var(--muted);margin-bottom:6px}
  .mp a.btn{display:block;text-align:center;background:var(--ink);color:#fff;text-decoration:none;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:600}
  .mtl-cat{margin-top:14px}
  .mtl-cat h3{font-size:13px;font-weight:700;color:var(--ink);margin:0 0 6px;letter-spacing:.02em}
  .mtl-item{display:grid;grid-template-columns:26px 1fr auto;gap:10px;padding:9px 0;border-top:1px solid var(--hairline);font-size:13px;align-items:start;cursor:pointer}
  .mtl-item:first-of-type{border-top:0}
  .mtl-item:hover{background:#fafaf6}
  .mtl-emoji{font-size:18px;line-height:1.2;text-align:center}
  .mtl-name{font-weight:600;line-height:1.3;color:var(--ink)}
  .mtl-note{font-size:11.5px;color:var(--muted);line-height:1.35;margin-top:1px}
  .mtl-fit{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border-radius:999px;white-space:nowrap;align-self:start;margin-top:2px}
  .fit-all{background:#e7f0e3;color:#3d6230}
  .fit-kid{background:#e6efff;color:#1d4ed8}
  .fit-mom{background:#fdf2e3;color:#b45309}
  .fit-adult{background:#f1ebfb;color:#7c3aed}
  .mtl-pin{position:relative}
  .mtl-pindiv{width:28px;height:28px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:14px}
  .mtl-pindiv .pi{transform:rotate(45deg);line-height:1}

  /* montpelier — reuses .mtl-* styles, plus week cards + grocery + driving */
  #mtpl-map{height:340px;width:100%;border-radius:10px;background:#e8e4dc;margin-bottom:12px}
  .week-card{background:#fafaf6;border-radius:10px;padding:12px 14px;margin-bottom:10px;border:0.5px solid var(--hairline)}
  .week-card .wd{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--warn);font-weight:700;margin-bottom:2px}
  .week-card .wt{font-size:14px;font-weight:700;margin:0 0 4px;line-height:1.3}
  .week-card .ws{font-size:12.5px;line-height:1.5;color:var(--ink);margin:0}
  .gro-grid{display:grid;grid-template-columns:1fr;gap:8px}
  .gro-card{background:#fafaf6;border-radius:10px;padding:11px 13px;border:0.5px solid var(--hairline)}
  .gro-card h4{font-size:12px;font-weight:700;color:var(--warn);margin:0 0 6px;letter-spacing:.04em;text-transform:uppercase}
  .gro-card ul{margin:0;padding-left:18px;font-size:12.5px;line-height:1.55;color:var(--ink)}
  .gro-card li{margin-bottom:1px}
  .driving-list{font-size:13px;line-height:1.55;margin:0;padding-left:18px;color:var(--ink)}
  .driving-list li{margin-bottom:4px}
  @media (min-width: 600px){
    .gro-grid{grid-template-columns:1fr 1fr}
  }

  /* itineraries */
  .itin-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .itin-tab{padding:8px 14px;border-radius:999px;border:1.5px solid var(--hairline);background:#fff;color:var(--ink);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:flex-start;gap:1px;line-height:1.2}
  .itin-tab .it-date{font-size:10.5px;color:var(--muted);font-weight:600}
  .itin-tab.active{background:#3d6230;color:#fff;border-color:#3d6230}
  .itin-tab.active .it-date{color:rgba(255,255,255,.8)}
  .itin-tab.all{justify-content:center;align-items:center;flex-direction:row}
  .itin-head{font-size:11px;color:var(--warn);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
  .itin-title{font-size:18px;font-weight:700;margin:0 0 4px;letter-spacing:-.01em}
  .itin-meta{font-size:12px;color:var(--muted);line-height:1.45;margin-bottom:14px}
  .itin-meta b{color:var(--ink);font-weight:600}
  .itin-stop{display:grid;grid-template-columns:84px 1fr;gap:10px;padding:10px 0;border-top:1px solid var(--hairline);font-size:13px}
  .itin-stop:first-of-type{border-top:0}
  .itin-time{font-size:11px;font-weight:700;color:var(--warn);padding-top:3px;letter-spacing:.02em}
  .itin-stop-body{cursor:pointer}
  .itin-stop-body:hover .itin-name{color:#3d6230}
  .itin-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3;margin-bottom:2px}
  .itin-note{font-size:12px;line-height:1.4;color:var(--muted)}
  .itin-fit{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border-radius:999px;margin-left:6px;vertical-align:middle}
  .itin-free{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3;margin-bottom:2px}

  @media (min-width: 760px){
    main{padding:28px 22px}
    #mtl-map{height:500px}
  }
</style>
</head>
<body>

<!-- Password gate -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="kicker">Summer 2026 · private</div>
    <h1>Family password</h1>
    <p>This page is for family logistics. Enter the password to unlock.</p>
    <form class="gate-form" id="gate-form">
      <input type="password" id="gate-input" placeholder="Password" autocomplete="off" autofocus />
      <button type="submit">Unlock</button>
      <div class="gate-err" id="gate-err"></div>
    </form>
  </div>
</div>

<!-- App (hidden until unlocked) -->
<header id="hdr" style="display:none">
  <div class="kicker">Summer 2026 · Vermont + Montreal</div>
  <h1>Where everyone is, when</h1>
  <div class="sub">Jun 25 – Jul 9 · primary tracker · noplacelike.nyc/summer-2026</div>
  <div class="pills" id="pills"></div>
  <div class="pills date-pills" id="date-pills"></div>
</header>
<main id="main" style="display:none"></main>
<footer id="ftr" style="display:none">made with love · annarobby</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

  ],
  grocery: [
    {name:"Hunger Mountain Co-op",              lat:44.2575, lng:-72.5800, emoji:"🛒", fit:"all",

  {key:'parks',    label:'Parks + outdoors', emoji:'🌳'},
  {key:'food',     label:'Easy meals',       emoji:'🍽️'},
  {key:'treats',   label:'Treats + downtown',emoji:'🍦'},
  {key:'kidDay',   label:'Mini road-trips',  emoji:'🚗'},

];

var MTPL_DRIVING = [

// ===== Montreal recommendations (plaintext — no PII) =====
// fit: 'all' = whole family, 'kid' = especially Inez, 'mom' = especially Lola, 'adult' = Anna+Robby only
var MTL_PLACES = {

var SESSION_KEY = "summer2026_pw";
var TRIP, WHEREIS, DAYS, PLACES;

function b64decode(s){
  return Uint8Array.from(atob(s), function(c){ return c.charCodeAt(0); });
}

async function deriveKey(password, salt){
  var enc = new TextEncoder();
  var keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), {name:"PBKDF2"}, false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:salt, iterations:100000, hash:"SHA-256"},
    keyMaterial,
    {name:"AES-GCM", length:256},
    false,
    ["decrypt"]
  );
}

async function tryUnlock(password){
  var salt = b64decode(SALT_B64);
  var iv   = b64decode(IV_B64);
  var ct   = b64decode(CT_B64);
  try{
    var key = await deriveKey(password, salt);
    var ptBuf = await crypto.subtle.decrypt({name:"AES-GCM", iv:iv}, key, ct);
    var json = new TextDecoder().decode(ptBuf);
    var data = JSON.parse(json);
    TRIP = data.TRIP;
    WHEREIS = data.WHEREIS;
    DAYS = data.DAYS;
    PLACES = data.PLACES;
    return true;
  }catch(e){
    return false;
  }
}

function showApp(){
  document.getElementById('gate').style.display='none';
  document.getElementById('hdr').style.display='';
  document.getElementById('main').style.display='';
  document.getElementById('ftr').style.display='';
  buildPills();
  render();
}

document.getElementById('gate-form').addEventListener('submit', async function(e){
  e.preventDefault();
  var pw = document.getElementById('gate-input').value;
  var err = document.getElementById('gate-err');
  err.textContent = '';
  var ok = await tryUnlock(pw);
  if (ok){
    try { sessionStorage.setItem(SESSION_KEY, pw); } catch(_){}
    showApp();
  } else {
    err.textContent = "Wrong password — try again.";
    document.getElementById('gate-input').value = '';
    document.getElementById('gate-input').focus();
  }
});

// Auto-unlock from session
(async function(){
  try {
    var cached = sessionStorage.getItem(SESSION_KEY);
    if (cached){
      var ok = await tryUnlock(cached);
      if (ok) { showApp(); return; }
      sessionStorage.removeItem(SESSION_KEY);
    }
  } catch(_){}
})();

// ===== Render code (runs after unlock) =====
function fmt(dateStr){
  var parts = dateStr.split('-');
  var d = new Date(Number(parts[0]), Number(parts[1])-1, Number(parts[2]));
  var dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var mons = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return {dow:dows[d.getDay()], mon:mons[d.getMonth()], day:d.getDate(),
          full: dows[d.getDay()] + ' ' + mons[d.getMonth()] + ' ' + d.getDate()};
}

function dateRange(start, end){
  var out = [];
  var s = start.split('-'); var e = end.split('-');
  var d = new Date(Number(s[0]), Number(s[1])-1, Number(s[2]));
  var done = new Date(Number(e[0]), Number(e[1])-1, Number(e[2]));
  while(d <= done){
    var y = d.getFullYear();
    var m = String(d.getMonth()+1).padStart(2,'0');
    var dd = String(d.getDate()).padStart(2,'0');
    out.push(y+'-'+m+'-'+dd);
    d.setDate(d.getDate()+1);
  }
  return out;
}

function pinIcon(emoji, fit){
  var bg = fit==='kid'?'#1d4ed8' : fit==='mom'?'#b45309' : fit==='adult'?'#7c3aed' : '#3d6230';
  return L.divIcon({
    className:'mtl-pin',
    html:'<div class="mtl-pindiv" style="background:'+bg+'"><span class="pi">'+emoji+'</span></div>',
    iconSize:[28,36], iconAnchor:[14,34], popupAnchor:[0,-30]
  });
}

function mtlPopupHtml(p){
  var fitLabel = {all:'All 4 of us', kid:'Kid magnet', mom:'Mom-loved', adult:'Adults only'}[p.fit];
  var mapsUrl = 'https://www.google.com/maps/dir/?api=1&destination='+p.lat+','+p.lng;
  return '<div class="mp"><div class="pt">'+fitLabel+'</div>'
       + '<h3 class="pn">'+p.emoji+' '+p.name+'</h3>'
       + '<p class="pd">'+p.note+'</p>'
       + '<a class="btn" href="'+mapsUrl+'" target="_blank" rel="noopener">Open in Maps</a></div>';
}

var mtlMap = null;
var mtlMarkers = {};
var mtlMode = 'day1'; // 'day1' | 'day2' | 'day3' | 'all'

function findPlace(name){
  var found = null;
  Object.keys(MTL_PLACES).forEach(function(k){
    MTL_PLACES[k].forEach(function(p){ if (p.name === name) found = p; });
  });
  return found;
}

function flyToPlace(name){
  var marker = mtlMarkers[name];
  if (!marker || !mtlMap) return;
  var ll = marker.getLatLng();
  mtlMap.flyTo(ll, 15, {duration:.6});
  setTimeout(function(){ marker.openPopup(); }, 600);
  document.getElementById('mtl-map').scrollIntoView({behavior:'smooth', block:'start'});
}

function renderItineraryBody(itin){
  var fitLabels = {all:'All 4', kid:'Kid', mom:'Mom', adult:'Adults'};
  var fitClass = function(f){ return 'fit-'+f; };
  var html = ''
    + '<div class="itin-head">'+itin.date+' · '+itin.neighborhood+'</div>'
    + '<h3 class="itin-title">'+itin.title+'</h3>'
    + '<p class="itin-meta">'+itin.pace+'</p>';
  itin.stops.forEach(function(stop){
    var place = stop.placeName ? findPlace(stop.placeName) : null;
    html += '<div class="itin-stop"><div class="itin-time">'+stop.time+'</div><div class="itin-stop-body" '
         + (place ? ('data-name="'+place.name.replace(/"/g,'&quot;')+'"') : '')
         + ' style="cursor:'+(place?'pointer':'default')+'">';
    if (place){
      html += '<div class="itin-name">'+place.emoji+' '+place.name
            + '<span class="itin-fit '+fitClass(place.fit)+'">'+fitLabels[place.fit]+'</span></div>';
    } else {
      html += '<div class="itin-free">'+(stop.name||'')+'</div>';
    }
    html += '<div class="itin-note">'+(stop.note||'')+'</div>'
         + '</div></div>';
  });
  return html;
}

function refitMap(){
  if (!mtlMap) return;
  var bounds = [];
  if (mtlMode === 'all'){
    Object.keys(MTL_PLACES).forEach(function(k){
      MTL_PLACES[k].forEach(function(p){ bounds.push([p.lat, p.lng]); });
    });
  } else {
    var itin = MTL_ITINERARIES.find(function(i){ return i.id === mtlMode; });
    if (itin){
      itin.stops.forEach(function(s){
        if (!s.placeName) return;
        var p = findPlace(s.placeName);
        if (p) bounds.push([p.lat, p.lng]);
      });
    }
  }
  if (bounds.length){ mtlMap.fitBounds(bounds, {padding:[40,40], maxZoom:15}); }
}

function refreshItinPanel(){
  var panel = document.getElementById('itin-body');
  if (!panel) return;
  if (mtlMode === 'all'){
    panel.innerHTML = ''
      + '<div class="itin-head">All Montreal places</div>'
      + '<h3 class="itin-title">À la carte browse</h3>'
      + '<p class="itin-meta">All ~30 pins on the map above, organized by category below. Use this when you want to pick something on the fly.</p>'
      + buildCategoryListHtml();
  } else {
    var itin = MTL_ITINERARIES.find(function(i){ return i.id === mtlMode; });
    panel.innerHTML = renderItineraryBody(itin);
  }
  // Wire up click flying
  panel.querySelectorAll('.itin-stop-body[data-name]').forEach(function(el){
    el.addEventListener('click', function(){ flyToPlace(el.dataset.name); });
  });
  panel.querySelectorAll('.mtl-item').forEach(function(row){
    row.addEventListener('click', function(){ flyToPlace(row.dataset.name); });
  });
  refitMap();
}

    html += '</div>';

}

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {maxZoom:19}).addTo(mtplMap);

    var bounds = [];
    Object.keys(MTPL_PLACES).forEach(function(catKey){
      MTPL_PLACES[catKey].forEach(function(p){
        var icon = pinIcon(p.emoji, p.fit);
        var marker = L.marker([p.lat, p.lng], {icon:icon}).addTo(mtplMap);
        marker.bindPopup(mtlPopupHtml(p), {maxWidth:260});
        mtplMarkers[p.name] = marker;
        bounds.push([p.lat, p.lng]);
      });
    });
    if (bounds.length){ mtplMap.fitBounds(bounds, {padding:[30,30], maxZoom:13}); }
    setTimeout(function(){ mtplMap.invalidateSize(); }, 100);

    document.querySelectorAll('.mtl-item[data-source="mtpl"]').forEach(function(row){
      row.addEventListener('click', function(){
        var marker = mtplMarkers[row.dataset.name];
        if (!marker) return;
        var ll = marker.getLatLng();
        mtplMap.flyTo(ll, 15, {duration:.6});
        setTimeout(function(){ marker.openPopup(); }, 600);
        document.getElementById('mtpl-map').scrollIntoView({behavior:'smooth', block:'start'});
      });
    });
  }, 50);
}

function render(){
  if (active === 'overview') renderOverview();
  else if (active === 'places') renderPlaces();
  else if (active === 'montpelier') renderMontpelier();
  else if (active === 'montreal') renderMontreal();
  else renderDay(active);
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
</body>
</html>
